<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body class="center">

<div class="card fade">
    <h2>Login</h2>
    <input id="u" placeholder="username">
    <input id="p" type="password" placeholder="password">
    <button onclick="login()">Masuk</button>
</div>

<script>
function login(){
    if(u.value=="admin" && p.value=="123"){
        localStorage.setItem("login",1);
        transition();
    }else{
        alert("Login salah");
    }
}

function transition(){
    document.body.style.opacity="0";
    setTimeout(()=>window.location="home.html",500);
}
</script>

</body>
</html>
